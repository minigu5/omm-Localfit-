name: Train recommendation model

"on":
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install omm + training deps
        run: |
          pip install -e .
          pip install -r requirements-train.txt

      - name: Preflight protected telemetry access
        env:
          LOCALFIT_TELEMETRY_EXPORT_URL: ${{ secrets.LOCALFIT_TELEMETRY_EXPORT_URL }}
          LOCALFIT_ADMIN_TOKEN: ${{ secrets.LOCALFIT_ADMIN_TOKEN }}
        run: |
          test -n "$LOCALFIT_TELEMETRY_EXPORT_URL" || { echo "LOCALFIT_TELEMETRY_EXPORT_URL is required"; exit 1; }
          if ! python -c 'import os; from urllib.parse import urlparse; p = urlparse(os.environ["LOCALFIT_TELEMETRY_EXPORT_URL"]); h = (p.hostname or "").lower(); raise SystemExit(not ((h.endswith(".firebaseio.com") or h.endswith(".firebasedatabase.app")) and p.path.endswith(".json")))'; then
            test -n "$LOCALFIT_ADMIN_TOKEN" || { echo "LOCALFIT_ADMIN_TOKEN is required for self-hosted telemetry"; exit 1; }
          fi
          cp published/recommend-model.json "$RUNNER_TEMP/localfit-incumbent.json"

      - name: Fetch HuggingFace candidate pool
        run: python scripts/fetch_hf_candidates.py

      - name: Train and quality-gate candidate model
        env:
          LOCALFIT_TELEMETRY_EXPORT_URL: ${{ secrets.LOCALFIT_TELEMETRY_EXPORT_URL }}
          LOCALFIT_ADMIN_TOKEN: ${{ secrets.LOCALFIT_ADMIN_TOKEN }}
        run: |
          python scripts/train_model.py \
            --telemetry-url "$LOCALFIT_TELEMETRY_EXPORT_URL" \
            --quality-gate \
            --minimum-real-configurations 100 \
            --baseline "$RUNNER_TEMP/localfit-incumbent.json" \
            --output "$RUNNER_TEMP/localfit-candidate.json" \
            --quality-report "$RUNNER_TEMP/localfit-quality-report.json"
          cp "$RUNNER_TEMP/localfit-candidate.json" published/recommend-model.json

      - name: Commit updated model artifact
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add published/recommend-model.json published/candidates.json
          git diff --cached --quiet && echo "No changes, skipping commit." && exit 0
          git commit -m "chore: retrain recommendation model [skip ci]"
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push rejected (attempt $i), rebasing onto origin/main and retrying..."
            git pull --rebase origin main
          done
          git push
